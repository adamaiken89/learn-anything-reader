subject: "Fixed Income Fundamentals"
time_budget_hours: 40
target_level: intermediate
domain: finance
prerequisites:
  - Basic financial literacy
  - High school algebra

learning_objectives:
  - "Price and yield any bond type and explain inverse price-yield relationship"
  - "Calculate duration and convexity, interpret as risk measures"
  - "Analyze yield curve shapes and theories"
  - "Understand credit risk, spreads, and CDS mechanics"
  - "Navigate bond trading, settlement, and brokerage operations"
  - "Apply fixed income strategies in portfolio context"

modules:
  - id: 1
    name: "Bond Fundamentals"
    time_hours: 2
    prerequisites: []
    topics: [terminology, pricing, yield, coupon]

  - id: 2
    name: "Time Value of Money & Bond Pricing"
    time_hours: 2
    prerequisites: [1]
    topics: [discounting, present-value, YTM, spot-rates]

  - id: 3
    name: "Government Bonds"
    time_hours: 2
    prerequisites: [2]
    topics: [treasuries, agencies, benchmarks, STRIPS]

  - id: 4
    name: "Corporate Bonds"
    time_hours: 2.5
    prerequisites: [2]
    topics: [IG, HY, credit-ratings, covenants, recovery]

  - id: 5
    name: "Municipal Bonds"
    time_hours: 1.5
    prerequisites: [2]
    topics: [GO, revenue, tax-treatment, muni-market]

  - id: 6
    name: "MBS & ABS"
    time_hours: 2.5
    prerequisites: [4]
    topics: [pass-through, CMO, prepayment, senior-sub]

  - id: 7
    name: "Repo & Reverse Repo"
    time_hours: 2
    prerequisites: [1]
    topics: [mechanics, haircut, GC, repo-rates]

  - id: 8
    name: "Yield Curve Analysis"
    time_hours: 3
    prerequisites: [2]
    topics: [shapes, expectations-theory, liquidity-preference, market-segmentation]

  - id: 9
    name: "Duration"
    time_hours: 3
    prerequisites: [2]
    topics: [macaulay, modified, dollar, key-rate, portfolio]

  - id: 10
    name: "Convexity"
    time_hours: 2
    prerequisites: [9]
    topics: [positive, negative, convexity-adjustment, barbell-bullet]

  - id: 11
    name: "Credit Analysis"
    time_hours: 2.5
    prerequisites: [4]
    topics: [fundamentals, ratios, credit-events, downgrade-risk]

  - id: 12
    name: "Credit Derivatives (CDS)"
    time_hours: 2
    prerequisites: [11]
    topics: [mechanics, pricing, basis-trade, indices]

  - id: 13
    name: "Bond Trading & OTC Markets"
    time_hours: 2
    prerequisites: [1, 3]
    topics: [liquidity, bid-ask, TRACE, electronic-trading]

  - id: 14
    name: "Bond Settlement & Custody"
    time_hours: 2
    prerequisites: [1]
    topics: [DVP, fails, clearing, custody, tri-party]

  - id: 15
    name: "Brokerage Operations for Fixed Income"
    time_hours: 2.5
    prerequisites: [14]
    topics: [trade-life-cycle, prime-brokerage, margin, reporting]

  - id: 16
    name: "Fixed Income Options"
    time_hours: 2
    prerequisites: [9]
    topics: [caps, floors, swaptions, embedded-options]

  - id: 17
    name: "FI Portfolio Strategies"
    time_hours: 2
    prerequisites: [8, 9, 10]
    topics: [ladder, barbell, bullet, immunization, indexing]

  - id: 18
    name: "Regulatory Environment"
    time_hours: 2
    prerequisites: [15]
    topics: [Basel, SEC, MSRB, Volcker, margin-rules]

  - id: 19
    name: "Private Bank Wealth Management & FI"
    time_hours: 2
    prerequisites: [17, 18]
    topics: [wealth-strategies, SMA, tax-aware, client-reporting]

  - id: 20
    name: "Capstone: Bond Portfolio Construction"
    time_hours: 2.5
    prerequisites: [17, 19]
    topics: [integration, risk-budgeting, case-study]
