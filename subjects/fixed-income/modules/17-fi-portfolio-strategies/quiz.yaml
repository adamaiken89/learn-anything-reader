- id: "17.1"
  question: "Portfolio with maturities concentrated in short + long maturities, skipping intermediate:"
  options:
    A: Bullet
    B: Barbell
    C: Ladder
    D: Immunization
  answer: B
  explanation: "Barbell has short and long maturities, no intermediate. Higher convexity than bullet at same duration."
  difficulty: 1
  tags: [strategies, barbell]

- id: "17.2"
  question: "Funding ratio is defined as:"
  options:
    A: Assets / Present value of liabilities
    B: PV(liabilities) / Assets
    C: Duration assets / Duration liabilities
    D: Coupon income / Total return
  answer: A
  explanation: "Funding ratio = Assets / PV(Liabilities). >1 means overfunded, <1 means underfunded."
  difficulty: 1
  tags: [strategies, LDI]

- id: "17.3"
  question: "Manager expects yield curve to steepen. Which strategy is likely preferred?"
  options:
    A: Barbell (short + long maturities)
    B: Bullet (concentrated intermediate maturities)
    C: Index replication
    D: Cash flow matching
  answer: B
  explanation: "Bullet concentrated in intermediate range avoids both short end (falling yield = price gain missed) and long end (rising yield = price loss). Preferred when curve steepening expected."
  difficulty: 2
  tags: [strategies, curve positioning]

- id: "17.4"
  question: "Key challenge unique to bond indexing (vs equity indexing):"
  options:
    A: High management fees
    B: Bonds mature and fall out of index, creating turnover
    C: Dividends complicate total return calculation
    D: No benchmark available
  answer: B
  explanation: "Bonds constantly mature and are replaced, creating ongoing turnover not present in equity indices."
  difficulty: 2
  tags: [strategies, indexing]

- id: "17.5"
  question: "Immunization strategy aims to:"
  options:
    A: Match asset duration to liability horizon
    B: Maximize total return regardless of risk
    C: Eliminate all credit risk from portfolio
    D: Achieve highest possible convexity
  answer: A
  explanation: "Immunization sets portfolio duration = liability horizon so price risk and reinvestment risk offset."
  difficulty: 2
  tags: [strategies, immunization]

- id: "17.6"
  question: "Ladder strategy primary advantage:"
  options:
    A: Highest convexity of any strategy
    B: Predictable cash flows with constant reinvestment
    C: Best performance in falling rate environments
    D: Zero tracking error vs benchmark
  answer: B
  explanation: "Ladder provides predictable cash flows as bonds mature at regular intervals, with constant reinvestment at current rates."
  difficulty: 1
  tags: [strategies, ladder]

- id: "17.7"
  question: "HNW client in high tax bracket wants bond income. Which approach is best?"
  options:
    A: High-yield corporate bonds in taxable account
    B: Municipal bonds in taxable account
    C: Treasury bonds in IRA
    D: REITs in taxable account
  answer: B
  explanation: "Municipal bonds are tax-exempt at federal level, ideal for taxable accounts of high-tax-bracket investors."
  difficulty: 2
  tags: [strategies, private bank, tax]

- id: "17.8"
  question: "Carry trade in fixed income means:"
  options:
    A: Buying bonds with highest coupon regardless of maturity
    B: Borrowing short-term to invest in longer-term bonds
    C: Selling CDS protection on investment grade names
    D: Leveraging with options on bond futures
  answer: B
  explanation: "Carry trade = borrow short (low rate), lend long (higher yield), profit from positive carry if curve upward sloping."
  difficulty: 2
  tags: [strategies, carry]

- id: "17.9"
  question: "Surplus of a pension fund changes most directly with:"
  options:
    A: Stock market performance only
    B: Changes in interest rates affecting both assets and liabilities
    C: Credit rating of the plan sponsor
    D: Dividend yield on equity holdings
  answer: B
  explanation: "Interest rates affect both bond asset values and PV of liabilities (discount rate). Surplus = Assets - PV(Liabilities)."
  difficulty: 2
  tags: [strategies, LDI, pension]

- id: "17.10"
  question: "Why does barbell strategy have higher convexity than bullet at same duration?"
  options:
    A: Short maturity bonds have zero convexity
    B: Long maturity bond's convexity dominates the portfolio
    C: Duration calculation is inaccurate for barbell
    D: Intermediate bonds have highest convexity
  answer: B
  explanation: "Convexity increases with maturity squared. Long maturity bond in barbell contributes outsized convexity relative to its weight."
  difficulty: 3
  tags: [strategies, convexity, barbell]
