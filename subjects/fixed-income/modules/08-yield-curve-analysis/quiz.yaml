- id: "8.1"
  question: "Inverted yield curve means:"
  options:
    A: "Short-term yields > long-term yields"
    B: "Long-term yields > short-term yields"
    C: "All yields equal"
    D: "Yields are negative"
  answer: A
  explanation: "Inverted: short rates > long rates. Historically precedes recession."
  difficulty: 1
  tags: [terminology, yield-curve]

- id: "8.2"
  question: "Expectations theory says 10yr yield = ?"
  options:
    A: "Average of expected future short rates over 10 years"
    B: "Current 10yr inflation"
    C: "Fed funds rate"
    D: "10yr corporate yield"
  answer: A
  explanation: "Long-term yield = average of expected future short-term rates over same period."
  difficulty: 2
  tags: [terminology, theory]

- id: "8.3"
  question: "Liquidity preference theory explains normal upward slope by:"
  options:
    A: "Supply/demand per maturity segment"
    B: "Investors require term premium for longer bonds"
    C: "Government issues more short-term debt"
    D: "Inflation expectations are constant"
  answer: B
  explanation: "Investors prefer shorter bonds (no price risk). Must pay premium to hold longer bonds → upward slope."
  difficulty: 2
  tags: [terminology, theory]

- id: "8.4"
  question: "1yr spot = 2%, 2yr spot = 3%. 1yr forward rate 1yr from now?"
  options:
    A: "3.00%"
    B: "4.01%"
    C: "2.50%"
    D: "5.00%"
  answer: B
  explanation: "(1.03)^2 / (1.02) - 1 = 1.0609/1.02 - 1 = 1.0401 - 1 = 4.01%"
  difficulty: 2
  tags: [calculation, forward-rates]

- id: "8.5"
  question: "Curve steepening means:"
  options:
    A: "Long rates fall relative to short rates"
    B: "Long rates rise relative to short rates"
    C: "All rates move equally"
    D: "Curve inverts"
  answer: B
  explanation: "Steepening: gap between long and short yields widens. Long up more / short down more."
  difficulty: 2
  tags: [terminology, yield-curve]

- id: "8.6"
  question: "A flat yield curve most likely signals:"
  options:
    A: "Rapid economic growth"
    B: "Transition or uncertainty period"
    C: "Deflation"
    D: "Currency crisis"
  answer: B
  explanation: "Flat curve = markets uncertain about direction. Often between normal and inversion. Transition phase."
  difficulty: 2
  tags: [scenario, yield-curve]

- id: "8.7"
  question: "Private bank client sees 2yr = 4.5%, 10yr = 3.8%. What is this signal?"
  options:
    A: "Bullish for stocks — growth ahead"
    B: "Recession warning — yield curve inverted"
    C: "No signal"
    D: "Inflation accelerating"
  answer: B
  explanation: "Inversion (2yr > 10yr) = historically reliable recession indicator. Client should consider defensive positioning."
  difficulty: 2
  tags: [scenario, private-bank]

- id: "8.8"
  question: "Market segmentation theory says yield curve shape determined by:"
  options:
    A: "Expected future rates only"
    B: "Supply/demand within each maturity segment independently"
    C: "Term premium only"
    D: "Central bank policy only"
  answer: B
  explanation: "Different investor types operate in different maturities. Supply/demand within each segment determines rates there."
  difficulty: 2
  tags: [terminology, theory]

- id: "8.9"
  question: "Swap spread is typically positive because:"
  options:
    A: "Swap rate < Treasury rate"
    B: "Swap rate reflects AA bank credit, Treasury rate reflects risk-free"
    C: "Swaps have no counterparty risk"
    D: "Treasuries have credit risk"
  answer: B
  explanation: "Swap spread = swap rate - Treasury rate. Positive because swap includes bank credit risk. Treasury = risk-free."
  difficulty: 3
  tags: [terminology, swaps]

- id: "8.10"
  question: "Client: 'I'll lend for 5 years if I get 50bp more than rolling 3-month T-Bills.' Which theory explains this?"
  options:
    A: "Expectations theory"
    B: "Liquidity preference theory"
    C: "Market segmentation theory"
    D: "Modern portfolio theory"
  answer: B
  explanation: "Liquidity premium: investor requires extra yield (term premium) to hold longer bond vs rolling short-term investments."
  difficulty: 2
  tags: [scenario, theory]
