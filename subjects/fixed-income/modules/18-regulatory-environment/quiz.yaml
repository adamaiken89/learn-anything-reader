- id: "18.1"
  question: "Which regulation mandates central clearing of standardized OTC derivatives in the US?"
  options:
    A: MiFID II
    B: Dodd-Frank Act Title VII
    C: EMIR
    D: Basel III
  answer: B
  explanation: "Dodd-Frank Title VII requires standardized OTC derivatives to clear through CCPs and trade on SEFs."
  difficulty: 1
  tags: [regulation, dodd-frank]

- id: "18.2"
  question: "Basel III liquidity rule requiring banks to hold enough HQLA to cover 30-day net cash outflows:"
  options:
    A: NSFR
    B: LCR
    C: SLR
    D: FRTB
  answer: B
  explanation: "LCR = High Quality Liquid Assets / 30-day net cash outflows ≥ 100%. Created structural demand for Treasuries."
  difficulty: 1
  tags: [regulation, basel, LCR]

- id: "18.3"
  question: "Under MiFID II, post-trade transparency for corporate bonds must be reported:"
  options:
    A: Instantaneously
    B: Within 15 minutes
    C: End of day
    D: Within 3 business days
  answer: B
  explanation: "MiFID II requires post-trade transparency within 15 minutes for corporate bonds (deferrals available for large trades)."
  difficulty: 2
  tags: [regulation, mifid]

- id: "18.4"
  question: "SEC Rule 2a-7 2014 reform required prime institutional money market funds to:"
  options:
    A: Close all new investments
    B: Use floating Net Asset Value (NAV)
    C: Invest only in Treasuries
    D: Maintain 100% daily liquid assets
  answer: B
  explanation: "Reform required prime institutional MMFs to abandon $1 constant NAV for floating NAV."
  difficulty: 2
  tags: [regulation, MMF]

- id: "18.5"
  question: "How does Basel III Supplementary Leverage Ratio (SLR) affect repo markets?"
  options:
    A: Increases repo borrowing capacity
    B: Constrains bank repo activity by limiting leverage on balance sheet
    C: Reduces haircut requirements
    D: Mandates CCP clearing for all repo
  answer: B
  explanation: "SLR limits bank leverage including repo book; banks reduce repo activity (especially at quarter-end) to stay under SLR constraints."
  difficulty: 2
  tags: [regulation, repo, basel]

- id: "18.6"
  question: "Which body oversees municipal bond market regulation?"
  options:
    A: SEC
    B: FINRA
    C: MSRB
    D: CFTC
  answer: C
  explanation: "MSRB (Municipal Securities Rulemaking Board) regulates municipal securities market."
  difficulty: 1
  tags: [regulation, muni]

- id: "18.7"
  question: "EMIR reporting obligation applies to:"
  options:
    A: All securities trades
    B: All derivative transactions
    C: Only credit default swaps
    D: Only exchange-traded futures
  answer: B
  explanation: "EMIR requires all OTC and exchange-traded derivatives to be reported to trade repositories."
  difficulty: 1
  tags: [regulation, EMIR]

- id: "18.8"
  question: "MiFID II Systematic Internaliser (SI) designation requires a firm to:"
  options:
    A: Internalize all client trades
    B: Provide firm quotes to clients
    C: Register as an exchange
    D: Clear all trades through CCP
  answer: B
  explanation: "SI = firm dealing on own account in organized/frequent/systematic way. Must publish firm quotes and be executable."
  difficulty: 3
  tags: [regulation, mifid, SI]

- id: "18.9"
  question: "Private bank must assess client knowledge and experience before recommending bonds under:"
  options:
    A: EMIR
    B: MiFID II suitability requirements
    C: Dodd-Frank Volcker Rule
    D: Basel III Pillar 2
  answer: B
  explanation: "MiFID II requires suitability assessment: match investment recommendation to client knowledge, experience, risk tolerance."
  difficulty: 2
  tags: [regulation, private bank, suitability]

- id: "18.10"
  question: "Which regulation requires automatic exchange of client account information across jurisdictions for tax purposes?"
  options:
    A: FATCA
    B: CRS
    C: Both FATCA and CRS
    D: Dodd-Frank Section 1502
  answer: C
  explanation: "FATCA (US) and CRS (global/OECD) both require automatic exchange of client financial account information for tax compliance."
  difficulty: 2
  tags: [regulation, cross-border, tax]
