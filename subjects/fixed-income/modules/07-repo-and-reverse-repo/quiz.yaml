- id: "7.1"
  question: "In a repo transaction, the borrower:"
  options:
    A: "Receives cash and delivers collateral"
    B: "Lends cash and receives collateral"
    C: "Buys a bond outright"
    D: "Issues new debt"
  answer: A
  explanation: "Repo borrower sells security today (delivers collateral), receives cash, repurchases later at higher price."
  difficulty: 1
  tags: [terminology, repo]

- id: "7.2"
  question: "Haircut of 5% on $50M collateral means cash lent is:"
  options:
    A: "$50M"
    B: "$47.5M"
    C: "$52.5M"
    D: "$45M"
  answer: B
  explanation: "Haircut = (collateral - cash) / collateral. Cash = 50M × (1-0.05) = $47.5M."
  difficulty: 1
  tags: [calculation, repo]

- id: "7.3"
  question: "Special repo rate below GC rate indicates:"
  options:
    A: "General funding shortage"
    B: "Specific security in high demand (short sellers)"
    C: "Central bank intervention"
    D: "Market stress"
  answer: B
  explanation: "Special rate: short-sellers need specific bond → lend cash at below-GC rate to borrow that bond."
  difficulty: 2
  tags: [terminology, repo]

- id: "7.4"
  question: "Which typically has the HIGHEST repo haircut?"
  options:
    A: "Treasuries"
    B: "Agency MBS"
    C: "High yield corporate bonds"
    D: "TIPS"
  answer: C
  explanation: "HY corporates: higher price volatility, lower liquidity → higher haircut (10-20%). Treasuries: lowest (0.5-2%)."
  difficulty: 2
  tags: [terminology, risk]

- id: "7.5"
  question: "Tri-party repo involves:"
  options:
    A: "Three bond issuers"
    B: "Third-party agent managing collateral and settlement"
    C: "Three different currencies"
    D: "Central bank, dealer, hedge fund"
  answer: B
  explanation: "Tri-party: bank (BNY/JPM) handles collateral valuation, margin, settlement. Reduces operational friction."
  difficulty: 2
  tags: [terminology, mechanics]

- id: "7.6"
  question: "A 10% haircut on $200M collateral position means borrower puts up how much equity?"
  options:
    A: "$20M"
    B: "$10M"
    C: "$30M"
    D: "$200M"
  answer: A
  explanation: "Borrower equity = collateral × haircut = $200M × 10% = $20M. Borrows $180M, puts up $20M."
  difficulty: 2
  tags: [calculation, leverage]

- id: "7.7"
  question: "Collateral value falls below loan amount. What happens?"
  options:
    A: "Nothing — repo is fixed"
    B: "Margin call: borrower must post additional collateral or cash"
    C: "Loan is forgiven"
    D: "Lender keeps collateral"
  answer: B
  explanation: "Repo marked to market daily. Collateral decline → margin call. Borrower adds cash/securities or faces default."
  difficulty: 2
  tags: [scenario, mechanics]

- id: "7.8"
  question: "Hedge fund borrows $80M in repo against $100M collateral. Haircut?"
  options:
    A: "10%"
    B: "20%"
    C: "25%"
    D: "80%"
  answer: B
  explanation: "Haircut = (100-80)/100 = 20%. Fund puts up $20M equity."
  difficulty: 2
  tags: [calculation, leverage]

- id: "7.9"
  question: "Private bank client: 'My bond fund repo financing cost rose suddenly.' Most likely?"
  options:
    A: "Fed cut rates"
    B: "GC repo rate spiked due to quarter-end reserve shortage"
    C: "Bond fund credit rating improved"
    D: "Collateral value increased"
  answer: B
  explanation: "Quarter-end: bank balance sheet constraints → repo rates spike (e.g., 2019 repo spike). GC rate directly impacts financing cost."
  difficulty: 3
  tags: [scenario, private-bank]

- id: "7.10"
  question: "SOFR replaced LIBOR as repo benchmark because:"
  options:
    A: "SOFR is based on actual repo transactions (not estimated)"
    B: "SOFR is higher than LIBOR"
    C: "LIBOR was too volatile"
    D: "SOFR includes unsecured lending"
  answer: A
  explanation: "SOFR = Secured Overnight Financing Rate. Based on actual Treasury repo transactions. LIBOR was estimated and manipulation-prone."
  difficulty: 2
  tags: [terminology, benchmarks]
