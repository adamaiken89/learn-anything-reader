- id: "20.1"
  question: "Capstone portfolio $5M, target duration 4.5 years. Upgrade to Step 3: why underweight duration vs Bloomberg Agg (6yr) given bearish rate view?"
  options:
    A: Lower duration means less price decline when yields rise
    B: Longer duration bonds always have lower yields
    C: Bloomberg Agg includes equities
    D: Duration has no impact on portfolio returns
  answer: A
  explanation: "Shorter duration = less sensitivity to rate increases. If yields rise 50bps, 4.5yr duration portfolio falls ~2.25% vs 3% for 6yr duration."
  difficulty: 2
  tags: [capstone, duration, rate view]

- id: "20.2"
  question: "Tax-equivalent yield on muni yielding 2.7% given 48.4% tax rate:"
  options:
    A: 2.70%
    B: 3.98%
    C: 5.23%
    D: 6.35%
  answer: C
  explanation: "TEY = 2.7% / (1 - 0.484) = 2.7% / 0.516 = 5.23%. Munis highly valuable for this client."
  difficulty: 2
  tags: [capstone, muni, tax, calculation]

- id: "20.3"
  question: "Portfolio generates $210K pre-tax income. Client needs $400K total. How to close gap?"
  options:
    A: Increase bond portfolio to $10M
    B: Supplement with equity dividends and real estate cash flow
    C: Sell equities and buy more bonds
    D: Use margin loan to pay remainder
  answer: B
  explanation: "Bond portfolio covers ~$255K incl. tax benefit. Remaining income from existing equity dividends ($5M, ~1.5-2% = $75-100K) and real estate ($3M, ~3-5% = $90-150K) closes gap."
  difficulty: 2
  tags: [capstone, income, portfolio construction]

- id: "20.4"
  question: "Client needs $1M liquidity for real estate in 2-3 years. Best asset to allocate for this?"
  options:
    A: 10-year corporate bonds
    B: 1-5yr Treasury ladder + cash equivalents (20% of portfolio)
    C: High-yield bonds with high coupon
    D: Long-duration muni bonds
  answer: B
  explanation: "Short Treasuries and cash provide predictable liquidity without forced sale losses. Total: $750K Treasuries + $250K cash = $1M."
  difficulty: 2
  tags: [capstone, liquidity, allocation]

- id: "20.5"
  question: "Maximum issuer concentration recommended in this portfolio:"
  options:
    A: 10% per issuer
    B: 5% per issuer
    C: 3% per issuer
    D: 1% per issuer
  answer: C
  explanation: "Max 3% per issuer limits single-name default risk across the $5M portfolio."
  difficulty: 2
  tags: [capstone, diversification, risk]

- id: "20.6"
  question: "If yields rise 75bps as predicted, approximate portfolio price change (duration 4.5yr, convexity 0.4):"
  options:
    A: -3.375% + convexity adjustment of +0.1125% = -3.26%
    B: -7.5% + convexity adjustment of +0.4% = -7.1%
    C: -4.5% only
    D: +3.375% + convexity adjustment
  answer: A
  explanation: "Duration effect = -4.5 × 0.75 = -3.375%. Convexity = 0.5 × 0.4 × (0.0075)^2 = +0.1125%. Net = -3.26%. Note convexity formula: 0.5 × C × (Δy)^2."
  difficulty: 3
  tags: [capstone, duration, convexity, calculation]

- id: "20.7"
  question: "Primary reason to avoid long-dated corporate bonds in this portfolio:"
  options:
    A: Too much yield
    B: Most price sensitivity to rate increases + lower liquidity
    C: Tax treatment different for long bonds
    D: ESG restrictions prohibit it
  answer: B
  explanation: "Bearish rate view + long duration = maximum price decline. Also long corporate bonds less liquid than short/intermediate."
  difficulty: 2
  tags: [capstone, corporate bonds, duration]

- id: "20.8"
  question: "Agency MBS limited to 10% of portfolio. Which risk does this primarily control?"
  options:
    A: Credit risk (agency MBS are risk-free)
    B: Prepayment risk / negative convexity in falling rate environment
    C: Liquidity risk
    D: Currency risk
  answer: B
  explanation: "Agency MBS have negative convexity from prepayment risk. Limiting to 10% controls convexity exposure that could distort portfolio duration."
  difficulty: 3
  tags: [capstone, MBS, convexity, risk]

- id: "20.9"
  question: "Client's TIPS allocation provides inflation hedge. Risk of placing TIPS in taxable account (vs IRA)?"
  options:
    A: TIPS have no special tax treatment
    B: TIPS generate phantom income — annual inflation adjustment taxed as income
    C: TIPS interest is exempt from state tax but not federal
    D: Both B and C apply
  answer: D
  explanation: "TIPS generate phantom income (inflation adjustment taxed yearly even though not received as cash). Interest exempt from state/local but taxable federally. For high-tax client, this creates cash-flow mismatch."
  difficulty: 3
  tags: [capstone, TIPS, tax, phantom income]

- id: "20.10"
  question: "Which rebalancing trigger is MOST important for maintaining portfolio risk profile?"
  options:
    A: Rebalancing to yield targets monthly
    B: Duration rebalancing semi-annually (duration drifts as time passes and rates change)
    C: Rebalancing by bond rating quarterly
    D: Rebalancing based on tax-loss harvesting opportunities
  answer: B
  explanation: "Duration drifts naturally as bonds age and rates move, changing portfolio risk profile. Semi-annual duration rebalancing keeps risk consistent with IPS."
  difficulty: 2
  tags: [capstone, rebalancing, risk]
