- id: "1.1"
  question: "A bond with face value $1,000 and coupon rate 6% pays how much annually?"
  options:
    A: "$60"
    B: "$6"
    C: "$600"
    D: "$1,060"
  answer: A
  explanation: "Annual coupon = coupon rate × face value = 0.06 × $1,000 = $60"
  difficulty: 1
  tags: [terminology, calculation]

- id: "1.2"
  question: "Bond selling above face value is called a ___ bond"
  options:
    A: discount
    B: premium
    C: par
    D: zero-coupon
  answer: B
  explanation: "Premium bond: market price > face value. Yield < coupon rate."
  difficulty: 1
  tags: [terminology]

- id: "1.3"
  question: "If market interest rates rise, what happens to existing bond prices?"
  options:
    A: They rise
    B: They fall
    C: They stay the same
    D: They double
  answer: B
  explanation: "Inverse relationship. New bonds pay higher coupons → old bonds less attractive → price falls to match yield."
  difficulty: 1
  tags: [pricing, core]

- id: "1.4"
  question: "Current yield is $50 annual coupon / $950 market price. What is it?"
  options:
    A: 5.00%
    B: 5.26%
    C: 4.76%
    D: 5.50%
  answer: B
  explanation: "$50/$950 = 0.0526 = 5.26%. Current yield ignores maturity gain/loss."
  difficulty: 2
  tags: [calculation]

- id: "1.5"
  question: "For a discount bond, which is true?"
  options:
    A: Yield > coupon rate
    B: Yield < coupon rate
    C: Yield = coupon rate
    D: Yield is zero
  answer: A
  explanation: "Discount bond: price < par. Buyer gets coupon + price appreciation to par → YTM > coupon rate."
  difficulty: 2
  tags: [pricing]

- id: "1.6"
  question: "Client holds $5M par of 3% bonds. Market now yields 4%. What best describes client's position?"
  options:
    A: Bonds trading at premium
    B: Bonds trading at discount
    C: Bonds trading at par
    D: Bonds have been called
  answer: B
  explanation: "Market yields (4%) > coupon (3%) → bonds must sell below par to be competitive. Client holds discount bonds."
  difficulty: 2
  tags: [scenario, pricing]

- id: "1.7"
  question: "Which yield measure accounts for both coupon income AND price change from purchase to maturity?"
  options:
    A: Current yield
    B: Coupon rate
    C: Yield to Maturity
    D: Dividend yield
  answer: C
  explanation: "YTM = total return assuming held to maturity: coupons + price convergence to par. Current yield ignores price gain/loss."
  difficulty: 2
  tags: [terminology, yield]

- id: "1.8"
  question: "A premium bond is purchased. Which is most likely TRUE over its life?"
  options:
    A: Bond price rises towards maturity
    B: Bond price falls towards par at maturity
    C: Bond price stays constant
    D: Bond is always called before maturity
  answer: B
  explanation: "Premium bond price gradually declines to par as maturity approaches. Buyer loses premium over time, offset by higher coupon."
  difficulty: 3
  tags: [scenario, pricing]

- id: "1.9"
  question: "Two bonds identical except Bond A = 5yr maturity, Bond B = 10yr maturity. Rates rise 1%. Which price falls more?"
  options:
    A: Bond A
    B: Bond B
    C: Both fall equally
    D: Neither price changes
  answer: B
  explanation: "Longer maturity = more future cash flows discounted at new higher rate. Price impact greater for longer bonds."
  difficulty: 3
  tags: [scenario, pricing, duration-intro]

- id: "1.10"
  question: "Private banking context: client says 'my bond fund lost 2% value this month'. Most likely cause?"
  options:
    A: Bond default
    B: Interest rates increased
    C: Coupon payment missed
    D: Fund fees increased
  answer: B
  explanation: "Monthly bond fund value changes are overwhelmingly driven by interest rate moves (via inverse price relationship). Default is rare for IG."
  difficulty: 2
  tags: [scenario, private-bank]
