- id: "6.1"
  question: "Agency MBS are backed by:"
  options:
    A: "Corporate credit"
    B: "Mortgage pools guaranteed by Fannie/Freddie/Ginnie"
    C: "Auto loans"
    D: "Municipal revenue"
  answer: B
  explanation: "Agency MBS = mortgages securitized by Ginnie Mae (explicit govt guarantee) or Fannie/Freddie (implicit)."
  difficulty: 1
  tags: [terminology, mbs]

- id: "6.2"
  question: "SMM = 1%. What is approximate CPR?"
  options:
    A: "6%"
    B: "11.4%"
    C: "12%"
    D: "1%"
  answer: B
  explanation: "CPR = 1 - (1-0.01)^12 = 1 - 0.99^12 = 1 - 0.8864 = 11.36%. ~11.4%"
  difficulty: 2
  tags: [calculation, prepayment]

- id: "6.3"
  question: "What happens to agency MBS prepayment when mortgage rates fall 1%?"
  options:
    A: "Prepayment decreases"
    B: "Prepayment increases significantly"
    C: "No effect"
    D: "Prepayment stops"
  answer: B
  explanation: "Rate drop → refinancing wave → prepayment spikes. More borrowers refinance to lower rate."
  difficulty: 1
  tags: [scenario, prepayment]

- id: "6.4"
  question: "In CMO sequential pay structure, which tranche receives principal first?"
  options:
    A: "Z-tranche"
    B: "Sequential A"
    C: "IO tranche"
    D: "Sequential C"
  answer: B
  explanation: "Sequential A receives all principal until fully paid, then B, then C, then Z. A has shortest average life."
  difficulty: 2
  tags: [terminology, cmo]

- id: "6.5"
  question: "IO (Interest Only) tranche value is hurt most by:"
  options:
    A: "Rising interest rates"
    B: "Fast prepayments"
    C: "Falling rates"
    D: "Extension risk"
  answer: B
  explanation: "Prepayment reduces outstanding principal → less interest paid to IO. Fast prepayment kills IO cash flows."
  difficulty: 2
  tags: [scenario, cmo]

- id: "6.6"
  question: "In senior/subordinate ABS structure, losses are absorbed first by:"
  options:
    A: "Senior tranche"
    B: "Subordinate (first loss) tranche"
    C: "All tranches equally"
    D: "Servicer"
  answer: B
  explanation: "Subordinate tranche absorbs first losses. This protects senior tranche from default losses up to subordination level."
  difficulty: 2
  tags: [terminology, abs]

- id: "6.7"
  question: "Prepayment burnout means:"
  options:
    A: "Prepayment speeds accelerate over time"
    B: "Prepayment slows as rate-sensitive borrowers have already refinanced"
    C: "Prepayment is constant"
    D: "Borrowers stop paying mortgages"
  answer: B
  explanation: "Burnout: after refinancing wave, remaining borrowers are less rate-sensitive → prepayment slows even if rates stay low."
  difficulty: 3
  tags: [terminology, prepayment]

- id: "6.8"
  question: "Private bank client's MBS fund duration shortened unexpectedly. Likely cause?"
  options:
    A: "Rates rose sharply"
    B: "Prepayments increased (refinancing wave)"
    C: "Defaults increased"
    D: "Fund manager sold long bonds"
  answer: B
  explanation: "Prepayments return principal faster → shorter average life → shorter duration. Contraction risk for MBS investors."
  difficulty: 2
  tags: [scenario, private-bank]

- id: "6.9"
  question: "Which ABS type typically has the longest weighted average life?"
  options:
    A: "Credit card ABS"
    B: "Auto ABS"
    C: "Student loan ABS"
    D: "CLO"
  answer: C
  explanation: "Student loans: long amortization (10-30yr), low prepayment → long WAL. Credit card: short revolving period. Auto: 3-7yr."
  difficulty: 3
  tags: [terminology, abs]

- id: "6.10"
  question: "Contraction risk in MBS refers to:"
  options:
    A: "Default risk increasing"
    B: "Prepayment shortens bond life when rates fall"
    C: "Extension of bond life when rates rise"
    D: "Collateral pool shrinking due to credit losses"
  answer: B
  explanation: "Contraction risk: rates fall → prepayments rise → bond pays off early → reinvest at lower rates. Extension risk is opposite."
  difficulty: 2
  tags: [terminology, risk]
