- id: "4.1"
  question: "Baa3 rating from Moody's corresponds to which S&P rating?"
  options:
    A: "BBB-"
    B: "BB+"
    C: "BBB+"
    D: "AA-"
  answer: A
  explanation: "Baa3 (Moody's) = BBB- (S&P). Both lowest IG tier."
  difficulty: 1
  tags: [terminology, ratings]

- id: "4.2"
  question: "Minimum IG rating in S&P scale?"
  options:
    A: "A-"
    B: "BBB-"
    C: "BB+"
    D: "BBB+"
  answer: B
  explanation: "BBB- = lowest IG. BB+ and below = high yield."
  difficulty: 1
  tags: [terminology, ratings]

- id: "4.3"
  question: "Which covenant prevents issuer from taking additional secured debt?"
  options:
    A: "Affirmative covenant"
    B: "Negative pledge covenant"
    C: "Cross-default covenant"
    D: "Dividend restriction"
  answer: B
  explanation: "Negative pledge: issuer cannot pledge assets as collateral for new debt without equally securing existing bondholders."
  difficulty: 2
  tags: [terminology, covenants]

- id: "4.4"
  question: "Recovery expectation for senior unsecured bond in default?"
  options:
    A: "70-80%"
    B: "30-50%"
    C: "0-10%"
    D: "100%"
  answer: B
  explanation: "Senior unsecured typically recovers 30-50% of face. Senior secured higher (collateral), subordinated lower."
  difficulty: 2
  tags: [terminology, recovery]

- id: "4.5"
  question: "Credit spread widens. Which macro condition likely caused it?"
  options:
    A: "Strong GDP growth"
    B: "Recession fears"
    C: "Fed cutting rates"
    D: "Stable inflation"
  answer: B
  explanation: "Recession fears → risk aversion → investors demand higher premium for credit risk → spreads widen."
  difficulty: 2
  tags: [scenario, spreads]

- id: "4.6"
  question: "Corporate bond yields 6.5%, Treasury yields 4.2%. Credit spread?"
  options:
    A: "1.3%"
    B: "2.3%"
    C: "4.2%"
    D: "6.5%"
  answer: B
  explanation: "6.5% - 4.2% = 2.3% = 230bp. Spread reflects credit + liquidity premium."
  difficulty: 1
  tags: [calculation, spreads]

- id: "4.7"
  question: "Private bank client: 'Why did my IG bond fund lose value even though no bonds defaulted?'"
  options:
    A: "Bond fund fees increased"
    B: "Credit spreads widened due to market stress"
    C: "Coupon rate decreased"
    D: "Maturity shortened"
  answer: B
  explanation: "Spread widening = higher yield = lower price, even without defaults. Common in market stress."
  difficulty: 2
  tags: [scenario, private-bank]

- id: "4.8"
  question: "Make-whole call provision means issuer:"
  options:
    A: "Can call bond at par anytime"
    B: "Must pay PV of remaining cash flows if called early"
    C: "Cannot call bond ever"
    D: "Must replace with new issue at same rate"
  answer: B
  explanation: "Make-whole: issuer pays PV of remaining coupons + principal at Treasury rate + spread. Expensive for issuer."
  difficulty: 2
  tags: [terminology, corporate]

- id: "4.9"
  question: "Bond downgraded from BBB- to BB+. Immediate effect?"
  options:
    A: "Price likely falls (many IG mandates forced to sell)"
    B: "Price rises (higher yield attractive)"
    C: "No change"
    D: "Bond is called"
  answer: A
  explanation: "Fallen angel: forced selling by IG-only mandates → price drops. Often overshoots → opportunity for HY buyers."
  difficulty: 3
  tags: [scenario, ratings]

- id: "4.10"
  question: "Which capital structure tier has highest recovery in bankruptcy?"
  options:
    A: "Subordinated debentures"
    B: "Senior secured notes"
    C: "Preferred stock"
    D: "Junior subordinated notes"
  answer: B
  explanation: "Senior secured = first claim on collateral assets. Highest recovery. Subordinated = last among bonds."
  difficulty: 2
  tags: [terminology, capital-structure]
