- id: "19.1"
  question: "HNW client in 40% federal + 5% state tax bracket considers 3% in-state muni yield. Tax-equivalent yield?"
  options:
    A: 4.00%
    B: 5.45%
    C: 3.00%
    D: 6.38%
  answer: B
  explanation: "TEY = 3% / (1 - 0.40 - 0.05) = 3% / 0.55 = 5.45%"
  difficulty: 2
  tags: [private bank, tax, calculation]

- id: "19.2"
  question: "Which bond type should be placed in tax-deferred account (IRA) for optimal tax efficiency?"
  options:
    A: In-state municipal bonds
    B: Corporate bonds
    C: Treasury bonds
    D: TIPS
  answer: B
  explanation: "Corporate bonds fully taxable; best in tax-deferred accounts. Munis tax-exempt, better in taxable accounts."
  difficulty: 2
  tags: [private bank, tax, allocation]

- id: "19.3"
  question: "Typical LTV for Treasury bonds in securities-based lending:"
  options:
    A: 50-60%
    B: 60-75%
    C: 75-85%
    D: 90-95%
  answer: D
  explanation: "Treasuries are highest quality collateral, typically 90-95% LTV in securities-based lending."
  difficulty: 1
  tags: [private bank, lending, LTV]

- id: "19.4"
  question: "Principal-protected note structure uses which FI instrument for capital guarantee?"
  options:
    A: High-yield bond
    B: Zero-coupon bond
    C: Floating rate note
    D: Municipal bond
  answer: B
  explanation: "Zero-coupon bond purchased at discount, matures at par = principal guarantee. Remainder invested in options."
  difficulty: 2
  tags: [private bank, structured products]

- id: "19.5"
  question: "Mass affluent client ($500k) bond allocation most likely via:"
  options:
    A: Dedicated bond manager
    B: Private placements
    C: Bond ETFs and mutual funds
    D: Direct syndicate participation
  answer: C
  explanation: "Mass affluent clients typically access bonds via funds/ETFs for cost-effective diversification."
  difficulty: 1
  tags: [private bank, segmentation]

- id: "19.6"
  question: "Tax-loss harvesting in bond portfolios must avoid:"
  options:
    A: Selling bonds at a gain
    B: Wash sale within 30 days
    C: Buying munis in taxable accounts
    D: Holding bonds to maturity
  answer: B
  explanation: "Wash sale rule: cannot repurchase substantially identical security 30 days before or after sale at loss."
  difficulty: 2
  tags: [private bank, tax, harvesting]

- id: "19.7"
  question: "Key difference between margin loan and private bank bond portfolio loan:"
  options:
    A: Margin loan has lower interest rate
    B: Bond portfolio loan typically has lower rate and is customized
    C: Margin loan is always non-recourse
    D: Bond portfolio loan has Reg T limits of 50%
  answer: B
  explanation: "Private bank bond portfolio loan typically offers lower rates (SOFR + small spread) than margin loans, with customized terms."
  difficulty: 2
  tags: [private bank, lending, margin]

- id: "19.8"
  question: "Best bond type for client needing inflation protection in taxable account:"
  options:
    A: TIPS in taxable account (phantom income issue)
    B: I Bonds in taxable account (tax-deferred interest)
    C: Floating rate notes in IRA
    D: Municipal bonds in taxable account
  answer: B
  explanation: "I Bonds offer inflation protection with tax-deferred interest, ideal for taxable accounts. TIPS create phantom income (tax on inflation adjustment)."
  difficulty: 3
  tags: [private bank, inflation, tax]

- id: "19.9"
  question: "Ultra-high-net-worth client benefit from Rule 144A bond market:"
  options:
    A: Guaranteed principal protection
    B: Access to private placements not available to retail investors
    C: Better transparency than public bonds
    D: Lower yields than public bonds
  answer: B
  explanation: "Rule 144A bonds are private placements sold to QIBs, offering access to issues not available in public markets."
  difficulty: 2
  tags: [private bank, UHNW, private placements]

- id: "19.10"
  question: "When advising multi-jurisdiction client on bond holdings, primary regulatory consideration:"
  options:
    A: Basel III capital requirements
    B: Cross-border reporting (FATCA/CRS) and suitability rules
    C: SEC Rule 2a-7 compliance
    D: Swap execution facility access
  answer: B
  explanation: "Multi-jurisdiction clients trigger cross-border reporting obligations (FATCA, CRS) and each jurisdiction's suitability/advisory rules."
  difficulty: 2
  tags: [private bank, cross-border, regulation]
