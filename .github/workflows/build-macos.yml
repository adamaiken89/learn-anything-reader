name: build MacOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run type check
        run: bun run typecheck

      - name: Run lint
        run: bun run lint

      - name: Build macOS app (stable)
        run: bun run build

      - name: Upload .app artifact
        uses: actions/upload-artifact@v7
        with:
          name: CourseReader-macOS-arm64
          path: build/stable-macos-arm64
          compression-level: 0
